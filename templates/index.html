<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Maison</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
    <script src="https://cdn.socket.io/4.7.1/socket.io.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #071726;
            --bg-alt: #123a4f;
            --surface: rgba(6, 24, 40, 0.75);
            --surface-soft: rgba(12, 36, 56, 0.72);
            --line: rgba(164, 214, 245, 0.2);
            --text-main: #f1fbff;
            --text-soft: #aac8dc;
            --accent: #3de1c4;
            --accent-2: #1ea8ff;
            --danger: #ff8da4;
            --success: #4fe089;
            --shadow: 0 26px 68px rgba(0, 3, 10, 0.4);
            --page-bg:
                radial-gradient(circle at 12% 16%, rgba(61, 225, 196, 0.25), transparent 34%),
                radial-gradient(circle at 88% 8%, rgba(30, 168, 255, 0.33), transparent 36%),
                linear-gradient(145deg, var(--bg-main), #0c2b41 52%, var(--bg-alt));
            --stream-bg: #020d16;
            --btn-dark-bg: rgba(255, 255, 255, 0.11);
            --btn-dark-border: rgba(255, 255, 255, 0.14);
            --btn-dark-text: var(--text-main);
        }

        [data-theme="light"] {
            --bg-main: #d9ecff;
            --bg-alt: #f2f9ff;
            --surface: rgba(255, 255, 255, 0.84);
            --surface-soft: rgba(249, 253, 255, 0.93);
            --line: rgba(56, 120, 156, 0.2);
            --text-main: #12324a;
            --text-soft: #4f728a;
            --shadow: 0 18px 44px rgba(12, 53, 84, 0.16);
            --page-bg:
                radial-gradient(circle at 14% 14%, rgba(53, 177, 157, 0.24), transparent 30%),
                radial-gradient(circle at 84% 10%, rgba(64, 152, 225, 0.28), transparent 34%),
                linear-gradient(155deg, #edf6ff, #e3f1ff 50%, #f5fbff);
            --stream-bg: #f6fbff;
            --btn-dark-bg: rgba(16, 74, 110, 0.1);
            --btn-dark-border: rgba(16, 74, 110, 0.24);
            --btn-dark-text: #113652;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text-main);
            font-family: "Manrope", sans-serif;
            background: var(--page-bg);
            padding: 24px;
        }

        .shell { width: min(1180px, 100%); margin: 0 auto; }

        .topbar {
            display: flex;
            gap: 16px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .title-box h1 {
            margin: 0;
            font-family: "Outfit", sans-serif;
            letter-spacing: 0.01em;
            font-size: clamp(1.75rem, 4vw, 2.5rem);
        }

        .subtitle { margin-top: 5px; color: var(--text-soft); font-size: 0.95rem; }

        .logout-form button {
            border: 1px solid rgba(255, 255, 255, 0.26);
            border-radius: 12px;
            background: var(--btn-dark-bg);
            color: var(--text-main);
            padding: 10px 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .logout-form button:hover { background: rgba(120, 162, 189, 0.23); }

        .top-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .theme-toggle {
            width: 42px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 1px solid var(--btn-dark-border);
            background: var(--btn-dark-bg);
            color: var(--text-main);
            padding: 0;
        }

        .grid { display: grid; gap: 20px; grid-template-columns: 1fr; }

        .panel {
            border: 1px solid var(--line);
            border-radius: 20px;
            background: var(--surface);
            backdrop-filter: blur(7px);
            box-shadow: var(--shadow);
            padding: 20px;
        }

        .panel h2 { margin: 0 0 5px; font-family: "Outfit", sans-serif; font-size: 1.35rem; }
        .panel small { color: var(--text-soft); }

        .status { margin-top: 8px; color: var(--text-soft); font-size: 0.95rem; }

        .action-row {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button, .btn {
            border: none;
            border-radius: 12px;
            padding: 11px 15px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        button:hover, .btn:hover {
            transform: translateY(-1px);
            filter: saturate(1.07);
        }

        .btn-primary {
            color: #062036;
            background: linear-gradient(130deg, var(--accent), #84f0ce 56%, #a2f0ff);
        }

        .btn-dark {
            color: var(--btn-dark-text);
            background: var(--btn-dark-bg);
            border: 1px solid var(--btn-dark-border);
        }

        .btn-danger {
            color: #34111b;
            background: linear-gradient(130deg, #ff9db2, #ffd0cc);
        }

        .btn-success {
            color: #05311b;
            background: linear-gradient(130deg, #66e89a, #b7f5ca);
        }

        .lamp-grid {
            margin-top: 18px;
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        }

        .lamp-card {
            border: 1px solid var(--line);
            border-radius: 16px;
            background: var(--surface-soft);
            padding: 16px;
            text-align: center;
        }

        .lamp-icon-wrap {
            min-height: 78px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lamp-icon-wrap i,
        .lamp-icon-wrap svg {
            width: 64px !important;
            height: 64px !important;
            font-size: 64px !important;
            display: block;
        }
        .lamp-card h3 { margin: 0 0 10px; font-size: 1.05rem; }

        .camera-grid {
            margin-top: 16px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 16px;
        }

        .stream-box {
            border: 1px solid var(--line);
            border-radius: 16px;
            overflow: hidden;
            min-height: 260px;
            background: var(--stream-bg);
            display: grid;
            place-items: center;
        }

        .stream-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .stream-placeholder { color: #86a8c0; padding: 20px; text-align: center; }

        .field { margin-top: 12px; }
        .field label { display: block; margin-bottom: 5px; color: var(--text-soft); font-size: 0.9rem; }

        .field input {
            width: 100%;
            border: 1px solid rgba(164, 214, 245, 0.34);
            border-radius: 11px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-main);
            padding: 10px 11px;
        }

        .field input:focus {
            outline: none;
            border-color: rgba(61, 225, 196, 0.92);
            box-shadow: 0 0 0 4px rgba(61, 225, 196, 0.18);
        }

        .list {
            margin-top: 10px;
            max-height: 260px;
            overflow: auto;
            border: 1px solid var(--line);
            border-radius: 12px;
        }

        .list-item {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(164, 214, 245, 0.14);
            font-size: 0.9rem;
        }
        .list-item:last-child { border-bottom: none; }

        .badge {
            display: inline-block;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-left: 6px;
        }

        .badge.recording { color: #082514; background: rgba(79, 224, 137, 0.92); }
        .badge.error { color: #370f1b; background: rgba(255, 141, 164, 0.92); }
        .badge.completed { color: #08253a; background: rgba(128, 202, 255, 0.9); }

        .msg { margin-top: 11px; font-size: 0.88rem; color: var(--text-soft); }
        .msg.error { color: var(--danger); }
        .msg.success { color: var(--success); }

        .meta-grid {
            margin-top: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 8px;
            font-size: 0.84rem;
            color: var(--text-soft);
        }

        .meta-card {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 8px 10px;
            background: var(--surface-soft);
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(2, 15, 24, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 120;
            padding: 16px;
        }

        .modal-card {
            width: min(480px, 100%);
            border: 1px solid var(--line);
            border-radius: 16px;
            background: var(--surface);
            box-shadow: var(--shadow);
            padding: 16px;
        }

        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .modal-head h3 {
            margin: 0;
            font-family: "Outfit", sans-serif;
            font-size: 1.2rem;
        }

        .close-modal-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            padding: 0;
            background: var(--btn-dark-bg);
            border: 1px solid var(--btn-dark-border);
            color: var(--text-main);
        }

        @media (max-width: 980px) {
            .camera-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 620px) {
            body { padding: 14px; }
            .panel { padding: 16px; }
            .topbar { align-items: flex-start; flex-direction: column; }
            .lamp-icon-wrap {
                min-height: 68px;
            }
            .lamp-icon-wrap i,
            .lamp-icon-wrap svg {
                width: 56px !important;
                height: 56px !important;
                font-size: 56px !important;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div class="title-box">
                <h1>Pilotage intelligent de la maison</h1>
                <div class="subtitle">Connecté en tant que <strong>{{ username }}</strong></div>
            </div>
            <div class="top-actions">
                <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Activer le mode clair">
                    <i id="theme-icon" class="fa-solid fa-moon"></i>
                </button>
                <button id="password-btn" class="btn-dark" type="button">
                    <i class="fa-solid fa-key"></i> Mot de passe
                </button>
                <form class="logout-form" method="POST" action="{{ url_for('logout') }}">
                    <button type="submit"><i class="fa-solid fa-right-from-bracket"></i> Déconnexion</button>
                </form>
            </div>
        </header>

        <main class="grid">
            <section class="panel">
                <h2>Éclairage & Prises</h2>

                <div class="status" id="status">Connexion au serveur...</div>

                <div class="action-row">
                    <button id="btn-all" class="btn-primary"><i class="fa-solid fa-bolt"></i> Allumer tout</button>
                </div>

                <div id="lamps-grid" class="lamp-grid"></div>
            </section>

            <section class="panel">
                <h2>CAMERA MAISON</h2>

                <div class="camera-grid">
                    <div>
                        <div class="stream-box" id="stream-box">
                            <img id="live-stream" src="/esp32cam/live?ts={{ range(1000000,9999999) | random }}" alt="Flux ESP32-CAM">
                            <div class="stream-placeholder" id="stream-placeholder" style="display:none;">En attente des frames MQTT...</div>
                        </div>

                        <div class="meta-grid">
                            <div class="meta-card">Dernière frame: <strong id="last-frame">-</strong></div>
                            <div class="meta-card">Taille frame: <strong id="frame-size">-</strong></div>
                        </div>

                        <div class="field">
                            <label for="device-id">Device ID ESP32-CAM</label>
                            <input id="device-id" type="text" placeholder="esp32cam-1">
                        </div>

                        <div class="action-row">
                            <button id="save-device" class="btn-primary"><i class="fa-solid fa-id-card"></i> Enregistrer device</button>
                            <button id="refresh-stream" class="btn-dark"><i class="fa-solid fa-rotate"></i> Relancer flux</button>
                            <button id="snapshot-btn" class="btn-success"><i class="fa-solid fa-camera"></i> Capturer image</button>
                            <button id="record-start" class="btn-primary"><i class="fa-solid fa-circle"></i> Démarrer rec</button>
                            <button id="record-stop" class="btn-danger"><i class="fa-solid fa-stop"></i> Arrêter rec</button>
                            <button id="cleanup-records" class="btn-dark"><i class="fa-solid fa-broom"></i> Nettoyer anciens enregistrements</button>
                        </div>
                        <div id="cam-msg" class="msg"></div>
                    </div>

                    <div>
                        <h3 style="margin:0 0 8px; font-family:'Outfit',sans-serif;">Historique</h3>
                        <small>Derniers enregistrements et captures</small>

                        <div style="margin-top:10px;">
                            <strong style="font-size:0.95rem;">Enregistrements</strong>
                            <div id="recordings-list" class="list"></div>
                        </div>

                        <div style="margin-top:12px;">
                            <strong style="font-size:0.95rem;">Captures</strong>
                            <div id="snapshots-list" class="list"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="password-modal" class="modal-backdrop" aria-hidden="true">
        <div class="modal-card">
            <div class="modal-head">
                <h3>Changer mot de passe</h3>
                <button id="password-close" class="close-modal-btn" type="button" aria-label="Fermer">×</button>
            </div>
            <div class="field">
                <label for="current-password">Mot de passe actuel</label>
                <input id="current-password" type="password" autocomplete="current-password">
            </div>
            <div class="field">
                <label for="new-password">Nouveau mot de passe</label>
                <input id="new-password" type="password" autocomplete="new-password">
            </div>
            <div class="field">
                <label for="confirm-password">Confirmer le nouveau mot de passe</label>
                <input id="confirm-password" type="password" autocomplete="new-password">
            </div>
            <div class="action-row" style="margin-top:12px;">
                <button id="password-save" class="btn-primary" type="button">
                    <i class="fa-solid fa-floppy-disk"></i> Enregistrer
                </button>
            </div>
            <div id="password-msg" class="msg"></div>
        </div>
    </div>

    <script>
        const lampNames = ["Devanture", "Salon", "Chambre", "Prise Salon", "Prise Chambre"];
        const lampMapping = ["devanture", "salon", "chambre", "prise_salon", "prise_chambre"];
        const isPrise = [false, false, false, true, true];
        let lampStates = [false, false, false, false, false];

        const socket = io();
        const THEME_KEY = "site-theme";

        function applyTheme(theme) {
            document.documentElement.setAttribute("data-theme", theme);
            const isLight = theme === "light";
            $("#theme-icon")
                .removeClass("fa-moon fa-sun")
                .addClass(isLight ? "fa-sun" : "fa-moon");
            $("#theme-toggle").attr("aria-label", isLight ? "Activer le mode sombre" : "Activer le mode clair");
        }

        function initTheme() {
            const saved = localStorage.getItem(THEME_KEY);
            applyTheme(saved === "light" ? "light" : "dark");
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute("data-theme") || "dark";
            const next = current === "dark" ? "light" : "dark";
            localStorage.setItem(THEME_KEY, next);
            applyTheme(next);
        }

        function setCamMessage(text, type = "") {
            const el = $("#cam-msg");
            el.removeClass("error success");
            if (type) el.addClass(type);
            el.text(text || "");
        }

        function setPasswordMessage(text, type = "") {
            const el = $("#password-msg");
            el.removeClass("error success");
            if (type) el.addClass(type);
            el.text(text || "");
        }

        function openPasswordModal() {
            $("#current-password").val("");
            $("#new-password").val("");
            $("#confirm-password").val("");
            setPasswordMessage("");
            $("#password-modal").css("display", "flex");
            $("#current-password").trigger("focus");
        }

        function closePasswordModal() {
            $("#password-modal").hide();
        }

        function changePassword() {
            const currentPassword = $("#current-password").val();
            const newPassword = $("#new-password").val();
            const confirmPassword = $("#confirm-password").val();

            if (!currentPassword || !newPassword || !confirmPassword) {
                setPasswordMessage("Veuillez remplir tous les champs.", "error");
                return;
            }

            $.ajax({
                url: "/api/account/password",
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify({
                    current_password: currentPassword,
                    new_password: newPassword,
                    confirm_password: confirmPassword
                }),
                success: (res) => {
                    setPasswordMessage(res.message || "Mot de passe modifié.", "success");
                    setTimeout(() => closePasswordModal(), 900);
                },
                error: (xhr) => {
                    const msg = xhr.responseJSON?.message || "Erreur lors de la mise à jour du mot de passe";
                    setPasswordMessage(msg, "error");
                }
            });
        }

        function generateLamps() {
            let html = "";
            lampNames.forEach((name, i) => {
                html += `
                <div class="lamp-card">
                    <div id="icon-wrap-${i}" class="lamp-icon-wrap"></div>
                    <h3>${name}</h3>
                    <button onclick="toggleLamp(${i})" id="btn-${i}" class="btn-dark" style="width:100%;">ÉTAT...</button>
                </div>`;
            });
            $("#lamps-grid").html(html);
            lampStates.forEach((state, i) => renderLampIcon(i, state));
            updateAllButtonText();
        }

        function renderLampIcon(idx, isOn) {
            const iconClass = isPrise[idx] ? "fa-plug" : "fa-lightbulb";
            const iconColor = isOn ? "#ffd571" : "#9bb6cb";
            const wrapper = $(`#icon-wrap-${idx}`);
            wrapper.html(`<i class="fa-solid ${iconClass}" style="color:${iconColor};"></i>`);
            if (window.FontAwesome?.dom?.i2svg) {
                window.FontAwesome.dom.i2svg({ node: wrapper[0] });
            }
        }

        function updateLampButton(idx, isOn) {
            lampStates[idx] = isOn;
            const btn = $(`#btn-${idx}`);

            if (isOn) {
                btn.removeClass("btn-dark").addClass("btn-success").text("ALLUMÉ");
            } else {
                btn.removeClass("btn-success").addClass("btn-dark").text("ÉTEINT");
            }
            renderLampIcon(idx, isOn);
            updateAllButtonText();
        }

        function areAllOn() {
            return lampStates.every(Boolean);
        }

        function updateAllButtonText() {
            const allBtn = $("#btn-all");
            if (areAllOn()) {
                allBtn.text("Tout éteindre").removeClass("btn-primary").addClass("btn-dark");
            } else {
                allBtn.text("Allumer tout").removeClass("btn-dark").addClass("btn-primary");
            }
        }

        function toggleLamp(idx) {
            const lampName = lampMapping[idx];
            const action = lampStates[idx] ? "OFF" : "ON";
            $.post("/control", { lampe: lampName, action })
                .fail(() => alert("Erreur de connexion au serveur"));
        }

        function toggleAllLamps() {
            const action = areAllOn() ? "OFF" : "ON";
            lampMapping.forEach((lamp) => {
                $.post("/control", { lampe: lamp, action });
            });
        }

        socket.on("lamp_update", (data) => {
            const idx = lampMapping.indexOf(data.lampe);
            if (idx >= 0) updateLampButton(idx, data.action === "ON");
        });

        socket.on("cam_status", (data) => {
            if (data?.received_at) {
                $("#last-frame").text(data.received_at);
            }
            if (data?.last_frame_size) {
                $("#frame-size").text(`${data.last_frame_size} bytes`);
            }
        });

        function restartLiveStream() {
            const img = $("#live-stream");
            img.attr("src", "/esp32cam/live?ts=" + Date.now());
            $("#stream-placeholder").hide();
            img.show();
        }

        function loadCameraConfig() {
            $.getJSON("/api/esp32cam/config", (res) => {
                if (!res.success) return;
                $("#device-id").val(res.device_id || "esp32cam-1");
                $("#frame-topic").text(res.frame_topic || "-");
                $("#status-topic").text(res.status_topic || "-");
            });
        }

        function saveCameraConfig() {
            const deviceId = $("#device-id").val().trim();
            if (!deviceId) {
                setCamMessage("Veuillez saisir un device ID.", "error");
                return;
            }
            $.ajax({
                url: "/api/esp32cam/config",
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify({ device_id: deviceId }),
                success: (res) => {
                    setCamMessage(res.message || "Device ID mis à jour.", "success");
                },
                error: (xhr) => {
                    const msg = xhr.responseJSON?.message || "Erreur sauvegarde device";
                    setCamMessage(msg, "error");
                }
            });
        }

        function startRecording() {
            $.post("/api/esp32cam/record/start", (res) => {
                setCamMessage(res.message || "Enregistrement démarré.", "success");
                loadRecordings();
            }).fail((xhr) => {
                const msg = xhr.responseJSON?.message || "Impossible de démarrer";
                setCamMessage(msg, "error");
            });
        }

        function stopRecording() {
            $.post("/api/esp32cam/record/stop", (res) => {
                setCamMessage(res.message || "Enregistrement arrêté.", "success");
                loadRecordings();
            }).fail((xhr) => {
                const msg = xhr.responseJSON?.message || "Impossible d'arrêter";
                setCamMessage(msg, "error");
            });
        }

        function captureSnapshot() {
            $.post("/api/esp32cam/snapshot", (res) => {
                setCamMessage(res.message || "Capture enregistrée.", "success");
                loadSnapshots();
            }).fail((xhr) => {
                const msg = xhr.responseJSON?.message || "Capture impossible";
                setCamMessage(msg, "error");
            });
        }

        function loadRecordings() {
            $.getJSON("/api/esp32cam/recordings", (res) => {
                const box = $("#recordings-list");
                box.empty();
                if (!res.success || !res.recordings.length) {
                    box.append('<div class="list-item">Aucun enregistrement</div>');
                    return;
                }
                res.recordings.forEach((r) => {
                    const statusClass = r.status === "recording" ? "recording" : (r.status === "error" ? "error" : "completed");
                    const badge = `<span class="badge ${statusClass}">${r.status}</span>`;
                    const preview = `<a class="btn btn-dark" style="display:inline-block;margin-top:7px;padding:5px 8px;font-size:0.76rem;text-decoration:none" target="_blank" href="/api/esp32cam/recordings/${r.id}/stream">Voir</a>`;
                    const error = r.error_message ? `<div style="color:#ff96ac;margin-top:3px;">${r.error_message}</div>` : "";
                    box.append(`
                        <div class="list-item">
                            #${r.id} ${badge}<br>
                            Frames: ${r.frame_count} | Début: ${r.started_at}<br>
                            ${preview}
                            ${error}
                        </div>
                    `);
                });
            });
        }

        function loadSnapshots() {
            $.getJSON("/api/esp32cam/snapshots", (res) => {
                const box = $("#snapshots-list");
                box.empty();
                if (!res.success || !res.snapshots.length) {
                    box.append('<div class="list-item">Aucune capture</div>');
                    return;
                }
                res.snapshots.forEach((s) => {
                    box.append(`
                        <div class="list-item">
                            #${s.id} - ${s.captured_at}<br>
                            <a class="btn btn-dark" style="display:inline-block;margin-top:6px;padding:5px 8px;font-size:0.76rem;text-decoration:none" target="_blank" href="/api/esp32cam/snapshots/${s.id}">Ouvrir</a>
                        </div>
                    `);
                });
            });
        }

        function loadCamRuntimeStatus() {
            $.getJSON("/api/esp32cam/status", (res) => {
                if (!res.success) return;
                const stream = res.stream || {};
                if (stream.last_received_at) {
                    $("#last-frame").text(stream.last_received_at);
                }
                if (stream.last_frame_size) {
                    $("#frame-size").text(`${stream.last_frame_size} bytes`);
                }
            });
        }

        function cleanupOldRecordings() {
            const confirmed = window.confirm("Supprimer les anciens enregistrements et garder seulement les 10 plus récents ?");
            if (!confirmed) return;

            $.ajax({
                url: "/api/esp32cam/recordings/cleanup",
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify({ keep_last: 10 }),
                success: (res) => {
                    setCamMessage(res.message || "Nettoyage terminé.", "success");
                    loadRecordings();
                },
                error: (xhr) => {
                    const msg = xhr.responseJSON?.message || "Erreur pendant le nettoyage";
                    setCamMessage(msg, "error");
                }
            });
        }

        $(document).ready(() => {
            initTheme();
            generateLamps();
            $("#status").text("Connexion active");

            $("#theme-toggle").on("click", toggleTheme);
            $("#password-btn").on("click", openPasswordModal);
            $("#password-close").on("click", closePasswordModal);
            $("#password-save").on("click", changePassword);
            $("#btn-all").on("click", toggleAllLamps);
            $("#save-device").on("click", saveCameraConfig);
            $("#refresh-stream").on("click", restartLiveStream);
            $("#record-start").on("click", startRecording);
            $("#record-stop").on("click", stopRecording);
            $("#snapshot-btn").on("click", captureSnapshot);
            $("#cleanup-records").on("click", cleanupOldRecordings);

            loadCameraConfig();
            loadRecordings();
            loadSnapshots();
            loadCamRuntimeStatus();

            setInterval(() => {
                loadRecordings();
                loadCamRuntimeStatus();
            }, 5000);

            $("#password-modal").on("click", (event) => {
                if (event.target.id === "password-modal") {
                    closePasswordModal();
                }
            });
        });
    </script>
</body>
</html>
